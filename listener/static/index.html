<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Humidity node</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<main class="viz-root">
  <header class="page-head">
    <h1>Humidity node <span class="node-id">humidity-01</span></h1>
    <p class="subtitle">DHT22 on a FireBeetle 2 ESP32-E, one reading every 5 minutes</p>
  </header>

  <nav class="filter-row" aria-label="Date range">
    <button class="range-btn" data-hours="24" aria-pressed="true">Last 24 h</button>
    <button class="range-btn" data-hours="168" aria-pressed="false">Last 7 days</button>
    <button class="range-btn" data-hours="720" aria-pressed="false">Last 30 days</button>
  </nav>

  <section class="tiles" id="tiles">
    <div class="tile tile-hero"><div class="tile-label">Relative humidity</div><div class="tile-value tile-value-hero" id="tile-rh">–</div></div>
    <div class="tile"><div class="tile-label">Temperature</div><div class="tile-value" id="tile-temp">–</div></div>
    <div class="tile"><div class="tile-label">Battery</div><div class="tile-value" id="tile-vbat">–</div></div>
    <div class="tile"><div class="tile-label">Last reading</div><div class="tile-value tile-value-sm" id="tile-seen">–</div>
      <div class="tile-status" id="tile-status"></div></div>
  </section>

  <section class="chart-card">
    <h2>Relative humidity <span class="unit">%</span></h2>
    <div class="chart" id="chart-rh"></div>
  </section>

  <div class="chart-row">
    <section class="chart-card">
      <h2>Temperature <span class="unit">°C</span></h2>
      <div class="chart" id="chart-temp"></div>
    </section>

    <section class="chart-card">
      <h2>Battery voltage <span class="unit">V</span></h2>
      <div class="chart" id="chart-vbat"></div>
    </section>
  </div>

  <section class="chart-card">
    <h2>Recent readings</h2>
    <div class="table-wrap">
      <table id="readings-table">
        <thead><tr><th>Time</th><th>°C</th><th>%RH</th><th>V</th><th>RSSI</th><th>Boot</th><th>Err</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>
<script src="/app.js"></script>
</body>
</html>
